<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vectus AI Attendance</title>
    <style>
        body { font-family: sans-serif; background: #0b0f1a; color: white; text-align: center; }
        .box { border: 2px solid #00d2ff; border-radius: 10px; margin: 10px; padding: 15px; background: #161b2a; }
        video { width: 100%; max-width: 400px; border-radius: 10px; }
        button { width: 100%; max-width: 400px; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-reg { background: #f1c40f; }
        .btn-att { background: #00d2ff; }
    </style>
</head>
<body onload="startCam()">
    <h2>⚡ VECTUS AI SYSTEM</h2>
    
    <div class="box">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <div class="box">
        <h3>NEW EMPLOYEE</h3>
        <input type="number" id="punch_no" placeholder="Enter Punch No" style="padding:10px; width:80%;">
        <button class="btn-reg" onclick="register()">REGISTER FACE</button>
    </div>

    <div class="box">
        <h3>DAILY ATTENDANCE</h3>
        <button class="btn-att" onclick="markAttendance()">IN / OUT SCAN</button>
    </div>

    <div id="status" style="margin:20px; font-weight:bold;"></div>

    <script>
        let lat, lng;
        navigator.geolocation.getCurrentPosition(p => { lat = p.coords.latitude; lng = p.coords.longitude; });

        async function startCam() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            document.getElementById('video').srcObject = stream;
        }

        async function capture() {
            const canvas = document.getElementById('canvas');
            const video = document.getElementById('video');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            return canvas.toDataURL('image/jpeg');
        }

        async function register() {
            const pno = document.getElementById('punch_no').value;
            if(!pno) return alert("ID dalo!");
            const img = await capture();
            const res = await fetch('/register', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({image: img, punch_no: pno}) });
            alert("Registered! ✅");
        }

        async function markAttendance() {
            const img = await capture();
            document.getElementById('status').innerText = "Scanning... ⏳";
            const res = await fetch('/scan', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({image: img, lat: lat, lng: lng}) });
            const data = await res.json();
            document.getElementById('status').innerText = data.status === 'Success' ? `✅ ${data.type} Marked: ID ${data.id}` : "❌ Error!";
        }
    </script>
</body>
</html>
